<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:wght@500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    .sierra-campus-body {
      font-family: "Source Sans 3", sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #1f2937;
      background: #f8fafc;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .sierra-campus-body h1,
    .sierra-campus-body h2,
    .sierra-campus-body h3,
    .sierra-campus-body h4 {
      font-family: "Source Serif 4", serif;
      letter-spacing: 0.01em;
      line-height: 1.3;
      color: #111827;
    }
  </style>
</head>
<body class="sierra-campus-body">
  <div id="sierra-header-root"></div>
  <div id="sierra-hero-root"></div>
  <div id="sierra-news-root"></div>
  <div id="sierra-section3-root"></div>
  <div id="sierra-gallery-root"></div>
  <div id="sierra-creatsection-root"></div>
  <div id="sierra-gallery2-root"></div>
  <div id="sierra-footer-root"></div>

  <script type="module">
    const injectionStatus = {
      header: document.getElementById('sierra-header-root') ? '✅' : '❌',
      hero: document.getElementById('sierra-hero-root') ? '✅' : '❌',
      news: document.getElementById('sierra-news-root') ? '✅' : '❌',
      section3: document.getElementById('sierra-section3-root') ? '✅' : '❌',
      gallery: document.getElementById('sierra-gallery-root') ? '✅' : '❌',
      gallery2: document.getElementById('sierra-gallery2-root') ? '✅' : '❌',
      creatsection: document.getElementById('sierra-creatsection-root') ? '✅' : '❌',
      footer: document.getElementById('sierra-footer-root') ? '✅' : '❌',
    };

    console.table(injectionStatus);

    setTimeout(() => {
      import('./header.js').then((module) => {
        console.log('✅ Header chargé');
        if (document.getElementById('sierra-header-root')) {
          new module.default('sierra-header-root');
        }
      }).catch(err => console.error('❌ Erreur header:', err));
    });
  </script>
</body>
</html>
